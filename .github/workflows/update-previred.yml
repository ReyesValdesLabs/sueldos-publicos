name: Update Previred indicators

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:
    inputs:
      source_url:
        description: "URL oficial del PDF de Previred (opcional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-previred
  cancel-in-progress: false

env:
  UPDATE_BRANCH: automation/update-previred

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Instalar lector de PDF
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Buscar y validar indicadores
        env:
          PREVIRED_SOURCE_URL: ${{ inputs.source_url }}
        run: node scripts/update-previred.mjs
      - name: Detectar cambios
        id: changes
        run: |
          if git diff --quiet -- src/data/parameters/previred.generated.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            node --input-type=module -e '
              import { readFile } from "node:fs/promises";
              import { parseGeneratedParameters } from "./scripts/lib/validate-previred-update.mjs";
              const source = await readFile("src/data/parameters/previred.generated.ts", "utf8");
              const parameters = parseGeneratedParameters(source);
              console.log(`period=${parameters.remunerationPeriod}`);
              console.log(`payment_period=${parameters.paymentPeriod}`);
              console.log(`source_url=${parameters.sourceUrl}`);
              console.log(`source_hash=${parameters.sourceHash}`);
            ' >> "$GITHUB_OUTPUT"
          fi
      - name: Validar sitio
        if: steps.changes.outputs.changed == 'true'
        run: pnpm check && pnpm test && pnpm test:automation && pnpm build
      - name: Preparar propuesta revisable
        if: steps.changes.outputs.changed == 'true'
        id: proposal
        env:
          PERIOD: ${{ steps.changes.outputs.period }}
          PAYMENT_PERIOD: ${{ steps.changes.outputs.payment_period }}
          SOURCE_URL: ${{ steps.changes.outputs.source_url }}
          SOURCE_HASH: ${{ steps.changes.outputs.source_hash }}
        run: |
          body_path="$RUNNER_TEMP/previred-pr-body.md"
          {
            echo "## Actualización previsional propuesta"
            echo
            echo "- Remuneraciones: \`$PERIOD\`"
            echo "- Pago de cotizaciones: \`$PAYMENT_PERIOD\`"
            echo "- Fuente oficial: [$SOURCE_URL]($SOURCE_URL)"
            echo "- Huella del PDF: \`$SOURCE_HASH\`"
            echo
            echo "### Cambio exacto"
            echo
            echo '```diff'
            git diff --no-ext-diff -- src/data/parameters/previred.generated.ts
            echo '```'
            echo
            echo "### Validaciones ejecutadas"
            echo
            echo "- Validación de origen, períodos y variaciones anómalas"
            echo "- \`pnpm check\`"
            echo "- \`pnpm test\`"
            echo "- \`pnpm test:automation\`"
            echo "- \`pnpm build\`"
            echo
            echo "> Esta PR es generada automáticamente, no tiene auto-merge y requiere revisión antes de llegar a producción."
          } > "$body_path"
          echo "body_path=$body_path" >> "$GITHUB_OUTPUT"
      - name: Publicar rama de actualización
        if: steps.changes.outputs.changed == 'true'
        env:
          PERIOD: ${{ steps.changes.outputs.period }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "refs/heads/${UPDATE_BRANCH}:refs/remotes/origin/${UPDATE_BRANCH}" || true
          expected_sha="$(git rev-parse --verify "refs/remotes/origin/${UPDATE_BRANCH}" 2>/dev/null || true)"
          git switch -C "$UPDATE_BRANCH"
          git add src/data/parameters/previred.generated.ts
          git commit -m "chore: proponer indicadores Previred $PERIOD"
          if [[ -n "$expected_sha" ]]; then
            git push --force-with-lease="refs/heads/${UPDATE_BRANCH}:$expected_sha" origin "HEAD:refs/heads/${UPDATE_BRANCH}"
          else
            git push origin "HEAD:refs/heads/${UPDATE_BRANCH}"
          fi
      - name: Crear o actualizar pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          PERIOD: ${{ steps.changes.outputs.period }}
          BODY_PATH: ${{ steps.proposal.outputs.body_path }}
        run: |
          title="chore: actualizar indicadores Previred ($PERIOD)"
          pr_number="$(gh pr list --repo "$GH_REPO" --state open --base "$BASE_BRANCH" --head "$UPDATE_BRANCH" --json number --jq '.[0].number')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --repo "$GH_REPO" --title "$title" --body-file "$BODY_PATH"
            pr_url="$(gh pr view "$pr_number" --repo "$GH_REPO" --json url --jq .url)"
          else
            pr_url="$(gh pr create --repo "$GH_REPO" --base "$BASE_BRANCH" --head "$UPDATE_BRANCH" --title "$title" --body-file "$BODY_PATH")"
          fi
          echo "Propuesta disponible en $pr_url" >> "$GITHUB_STEP_SUMMARY"
