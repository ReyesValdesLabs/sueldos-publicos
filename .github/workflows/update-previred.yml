name: Actualizar indicadores Previred

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:
    inputs:
      source_url:
        description: "URL oficial del PDF de Previred (opcional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-previred
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Instalar lector de PDF
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile
      - name: Buscar y validar indicadores
        env:
          PREVIRED_SOURCE_URL: ${{ inputs.source_url }}
        run: node scripts/update-previred.mjs
      - name: Detectar cambios
        id: changes
        run: |
          if git diff --quiet -- src/data/parameters/previred.generated.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Validar sitio
        if: steps.changes.outputs.changed == 'true'
        run: pnpm check && pnpm test && pnpm test:automation && pnpm build
      - name: Publicar parámetros verificados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/parameters/previred.generated.ts
          git commit -m "chore: actualizar indicadores Previred"
          git push
